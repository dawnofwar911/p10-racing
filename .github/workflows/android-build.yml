name: P10 Racing CI/CD
run-name: ${{ github.event.head_commit.message || github.workflow }}

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  validate:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Run Tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run test

  release-android:
    name: Android Release Build
    needs: validate
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Static Site
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Build Release AAB
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Sign Android Release AAB
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.PLAYSTORE_SIGNING_KEY }}
          alias: ${{ secrets.PLAYSTORE_ALIAS }}
          keyStorePassword: ${{ secrets.PLAYSTORE_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.PLAYSTORE_KEY_PASSWORD }}

      - name: Generate Release Notes
        run: |
          mkdir -p distribution/whatsnew
          # Capture the latest commit message, limit to 500 chars (Play Store limit)
          git log -1 --pretty=%B | head -c 500 > distribution/whatsnew/whatsnew-en-GB

      - name: Upload to Google Play (Internal Testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAYSTORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.p10racing.app
          releaseFiles: ${{steps.sign_aab.outputs.signedReleaseFile}}
          track: internal
          status: completed
          whatsNewDirectory: distribution/whatsnew
