name: P10 Racing CI/CD
run-name: ${{ github.event.head_commit.message || github.workflow }}

on:
  push:
    branches: [ 'main', 'stable' ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  validate:
    name: Code Quality & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Run Tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run test

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Tests
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  release-android:
    name: Android Release Build
    needs: validate
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/stable')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Extract Version
        id: get_version
        run: jq -r '"VERSION=" + .version' package.json >> $GITHUB_OUTPUT

      - name: Set Release Environment
        id: set_env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TRACK=internal" >> $GITHUB_OUTPUT
            echo "TAG_SUFFIX=-internal" >> $GITHUB_OUTPUT
          else
            echo "TRACK=closed" >> $GITHUB_OUTPUT
            echo "TAG_SUFFIX=" >> $GITHUB_OUTPUT
          fi

      - name: Build Static Site
        if: steps.set_env.outputs.TRACK == 'internal'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SHAKE_THRESHOLD: ${{ vars.NEXT_PUBLIC_SHAKE_THRESHOLD }}
        run: npm run build

      - name: Sync Capacitor
        if: steps.set_env.outputs.TRACK == 'internal'
        run: npx cap sync android

      - name: Create google-services.json
        if: steps.set_env.outputs.TRACK == 'internal'
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json

      - name: Build Release AAB
        if: steps.set_env.outputs.TRACK == 'internal'
        env:
          VERSION_CODE: ${{ github.run_number }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Sign Android Release AAB
        if: steps.set_env.outputs.TRACK == 'internal'
        uses: r0adkll/sign-android-release@v1
        id: sign_aab
        with:
          releaseDirectory: android/app/build/outputs/bundle/release
          signingKeyBase64: ${{ secrets.PLAYSTORE_SIGNING_KEY }}
          alias: ${{ secrets.PLAYSTORE_ALIAS }}
          keyStorePassword: ${{ secrets.PLAYSTORE_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.PLAYSTORE_KEY_PASSWORD }}

      - name: Create and Push Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          TAG="v${VERSION}${{ steps.set_env.outputs.TAG_SUFFIX }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists. Skipping tagging."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Generate Release Notes
        if: steps.set_env.outputs.TRACK == 'internal'
        id: release_notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p distribution/whatsnew
          touch distribution/whatsnew/whatsnew-en-GB
          
          # We only generate notes for internal (main) track automatically.
          # Stable releases use manual promotion.
          if [[ "${{ steps.set_env.outputs.TAG_SUFFIX }}" == "-internal" ]]; then
            git describe --tags --match "v*-internal" --abbrev=0 2>/dev/null > last_tag.txt || true
          else
            # Fallback for non-internal tracks if ever enabled
            git describe --tags --match "v*" --exclude "*-internal" --abbrev=0 2>/dev/null > last_tag.txt || true
          fi
          
          read -r LAST_TAG < last_tag.txt || true
          if [ -z "$LAST_TAG" ]; then
            git log -5 --pretty=format:"- %s" | head -c 500 > distribution/whatsnew/whatsnew-en-GB || true
          else
            git log "$LAST_TAG"..HEAD --pretty=format:"- %s" | head -c 500 > distribution/whatsnew/whatsnew-en-GB || true
          fi
          
          if [ ! -s distribution/whatsnew/whatsnew-en-GB ]; then
            git log -1 --pretty=format:"- %s" | head -c 500 > distribution/whatsnew/whatsnew-en-GB || true
          fi

      - name: Upload to Google Play
        if: steps.set_env.outputs.TRACK == 'internal'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAYSTORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.p10racing.app
          releaseFiles: ${{steps.sign_aab.outputs.signedReleaseFile}}
          track: ${{ steps.set_env.outputs.TRACK }}
          status: completed
          whatsNewDirectory: distribution/whatsnew
